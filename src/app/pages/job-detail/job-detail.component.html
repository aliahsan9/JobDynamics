<div class="container mt-5" *ngIf="job; else noJob">

  <!-- JOB HEADER -->
  <div class="job-header card p-4 mb-4 shadow-sm">

    <h2 class="job-title mb-2">{{job.title}}</h2>

    <div class="job-meta mb-2">
      <span>🏢 {{job.company}}</span> |
      <span>📍 {{job.location}}</span>
    </div>

    <div class="job-deadline badge">
      ⏳ Apply Before: {{job.lastDate}}
    </div>

  </div>

  <!-- MARKDOWN CONTENT -->
  <div class="job-content card p-4 shadow-sm">
    <markdown [src]="job.file"></markdown>
  </div>

  <!-- APPLY BUTTON -->
  <div class="text-center mt-4">
    <a [routerLink]="['/apply', job.slug]" class="btn btn-primary btn-lg">
      Apply Now
    </a>
  </div>

</div>

<!-- EMPTY STATE -->
<ng-template #noJob>
  <div class="empty-state text-center p-5">
    <h4>Job Not Found</h4>
    <p>Sorry, the job you are looking for does not exist.</p>
  </div>
</ng-template>
