<div class="jobs-section container">

<!-- Header -->

<div class="jobs-header">

<h2>Latest Opportunities</h2>

<a routerLink="/jobs" class="view-all">
View All Jobs →
</a>

</div>


<!-- Jobs Grid -->

<div class="row g-4" *ngIf="jobs.length; else noJobs">

<div class="col-md-6 col-lg-4" *ngFor="let job of jobs">

<div class="job-card">

<!-- Category -->

<div class="job-category">
{{job.category || 'Job'}}
</div>

<!-- Title -->

<h5 class="job-title">
{{job.title}}
</h5>

<!-- Meta -->

<div class="job-meta">

<span>
🏢 {{job.company}}
</span>

<span>
📍 {{job.location}}
</span>

</div>

<!-- Footer -->

<div class="job-footer">

<span class="deadline">
Last Date: {{job.lastDate}}
</span>

<a
[routerLink]="['/job', job.slug]"
class="apply-btn">

View Details

</a>

</div>

</div>

</div>

</div>


<!-- Empty State -->

<ng-template #noJobs>

<div class="empty-state">

<h4>No Jobs Found</h4>

<p>
New jobs will appear here soon. Please check back later.
</p>

</div>

</ng-template>

</div>
